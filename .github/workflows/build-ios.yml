name: Build iOS

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app (native — analytics suppressed)
        run: npm run build
        env:
          VITE_IS_NATIVE: 'true'

      - name: Capacitor sync
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Deploy custom iOS icons
        run: |
          ASSET_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ASSET_DIR"

          # Copy iOS icons
          if [ -d release-package/icons/ios ]; then
            cp release-package/icons/ios/*.png "$ASSET_DIR/" 2>/dev/null || true
            echo "✓ Copied iOS icon PNGs"

            # Copy or create Contents.json
            if [ -f release-package/icons/ios/Contents.json ]; then
              cp release-package/icons/ios/Contents.json "$ASSET_DIR/"
              echo "✓ Copied iOS Contents.json"
            fi
          fi

      - name: Build (unsigned, for CI validation)
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      # For a real App Store build, configure signing via secrets:
      # https://docs.github.com/en/actions/deployment/deploying-xcode-applications
      #
      # - name: Build signed IPA (tags only)
      #   if: startsWith(github.ref, 'refs/tags/v')
      #   ...
